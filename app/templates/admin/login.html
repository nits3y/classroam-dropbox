{% extends "base.html" %}
{% block title %}Teacher login — Classroom Dropbox{% endblock %}

{% block content %}
<div class="card">
    <div class="app-label">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0f6e56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display: block; margin: 0 auto 0.75rem;">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        Teacher access
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="post" class="stacked-form">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" autofocus>
        <button type="submit">Log in</button>
    </form>
</div>
{% endblock %}
