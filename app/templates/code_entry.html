{% extends "base.html" %}
{% block title %}Enter code — Classroom Dropbox{% endblock %}

{% block content %}
<div class="card">
    <div class="app-label">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0f6e56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display: block; margin: 0 auto 0.5rem;">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        Classroam Dropbox
    </div>

    <div class="code-form">
        <label for="code">Enter your code</label>
        <input type="text" id="code" name="code" placeholder="e.g. A1B2C3" autocomplete="off" autofocus maxlength="10" style="text-transform: uppercase; letter-spacing: 0.15em;">
        <div id="error-msg" class="error-text" style="display: none;"></div>
        <button type="button" id="continue-btn" disabled>
            <span id="btn-text">Continue</span>
            <span id="btn-spinner" style="display: none;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 0.8s linear infinite; vertical-align: middle;">
                    <line x1="12" y1="2" x2="12" y2="6"/>
                    <line x1="12" y1="18" x2="12" y2="22"/>
                    <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/>
                    <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/>
                    <line x1="2" y1="12" x2="6" y2="12"/>
                    <line x1="18" y1="12" x2="22" y2="12"/>
                    <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/>
                    <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>
                </svg>
                Checking...
            </span>
        </button>
    </div>
</div>

<style>
@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>

<script src="{{ url_for('static', filename='js/code_entry.js') }}"></script>
{% endblock %}
