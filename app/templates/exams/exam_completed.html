{% extends "base.html" %}
{% block title %}Exam already completed - Classroom Dropbox{% endblock %}

{% block content %}
<div class="card student-card" style="text-align: center;">
    <div class="success-check" style="background: #dbeafe; color: #1d4ed8;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6 9 17l-5-5"/>
        </svg>
    </div>
    <h1>Exam already completed</h1>
    <p class="subtle" style="margin-bottom: 0.5rem;">This device or network has already completed <strong>{{ exam.title }}</strong>.</p>
    <p class="subtle" style="font-size: 0.92rem; color: #64748b; margin-bottom: 1rem;">Ask your teacher if you need permission to retake it.</p>
    <a class="button student-button" href="{{ url_for('main.code_entry') }}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to code entry
    </a>
</div>
{% endblock %}
